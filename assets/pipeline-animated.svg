<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 140" width="840" height="140">
  <defs>
    <linearGradient id="pBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#04101E"/>
      <stop offset="50%" stop-color="#0A1929"/>
      <stop offset="100%" stop-color="#04101E"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="840" height="140" fill="url(#pBg)" rx="10"/>

  <!-- Connection lines -->
  <line x1="90" y1="60" x2="180" y2="60" stroke="#0C447C" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke" values="#0C447C;#378ADD;#0C447C" dur="3s" begin="0.4s" repeatCount="indefinite"/>
  </line>
  <line x1="240" y1="60" x2="330" y2="60" stroke="#0C447C" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke" values="#0C447C;#378ADD;#0C447C" dur="3s" begin="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="390" y1="60" x2="460" y2="60" stroke="#0C447C" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke" values="#0C447C;#378ADD;#0C447C" dur="3s" begin="1.2s" repeatCount="indefinite"/>
  </line>
  <line x1="520" y1="60" x2="590" y2="60" stroke="#0C447C" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke" values="#0C447C;#378ADD;#0C447C" dur="3s" begin="1.6s" repeatCount="indefinite"/>
  </line>
  <line x1="650" y1="60" x2="720" y2="60" stroke="#0C447C" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke" values="#0C447C;#378ADD;#0C447C" dur="3s" begin="2.0s" repeatCount="indefinite"/>
  </line>

  <!-- Flowing dots on each line -->
  <circle r="3" fill="#378ADD" filter="url(#dotGlow)" opacity="0.8">
    <animateMotion path="M90,60 L180,60" dur="1s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#378ADD" filter="url(#dotGlow)" opacity="0.8">
    <animateMotion path="M240,60 L330,60" dur="1s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#378ADD" filter="url(#dotGlow)" opacity="0.8">
    <animateMotion path="M390,60 L460,60" dur="1s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#378ADD" filter="url(#dotGlow)" opacity="0.8">
    <animateMotion path="M520,60 L590,60" dur="1s" begin="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#378ADD" filter="url(#dotGlow)" opacity="0.8">
    <animateMotion path="M650,60 L720,60" dur="1s" begin="2.0s" repeatCount="indefinite"/>
  </circle>

  <!-- Stage nodes -->
  <!-- 1: Idea -->
  <g filter="url(#nodeGlow)">
    <circle cx="60" cy="60" r="26" fill="#04101E" stroke="#185FA5" stroke-width="2">
      <animate attributeName="stroke" values="#185FA5;#378ADD;#185FA5" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="64" text-anchor="middle" font-family="monospace" font-size="18" fill="#E8F4FD">💡</text>
    <text x="60" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#4A7A9B">Idea</text>
  </g>

  <!-- 2: Design -->
  <g filter="url(#nodeGlow)">
    <circle cx="210" cy="60" r="26" fill="#04101E" stroke="#185FA5" stroke-width="2">
      <animate attributeName="stroke" values="#185FA5;#378ADD;#185FA5" dur="3s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <text x="210" y="64" text-anchor="middle" font-family="monospace" font-size="18" fill="#E8F4FD">🎨</text>
    <text x="210" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#4A7A9B">Design</text>
  </g>

  <!-- 3: Code -->
  <g filter="url(#nodeGlow)">
    <circle cx="360" cy="60" r="26" fill="#04101E" stroke="#185FA5" stroke-width="2">
      <animate attributeName="stroke" values="#185FA5;#378ADD;#185FA5" dur="3s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <text x="360" y="64" text-anchor="middle" font-family="monospace" font-size="18" fill="#E8F4FD">⌨️</text>
    <text x="360" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#4A7A9B">Code</text>
  </g>

  <!-- 4: Docker -->
  <g filter="url(#nodeGlow)">
    <circle cx="490" cy="60" r="26" fill="#04101E" stroke="#185FA5" stroke-width="2">
      <animate attributeName="stroke" values="#185FA5;#378ADD;#185FA5" dur="3s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="490" y="64" text-anchor="middle" font-family="monospace" font-size="18" fill="#E8F4FD">🐳</text>
    <text x="490" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#4A7A9B">Docker</text>
  </g>

  <!-- 5: CI/CD -->
  <g filter="url(#nodeGlow)">
    <circle cx="620" cy="60" r="26" fill="#04101E" stroke="#185FA5" stroke-width="2">
      <animate attributeName="stroke" values="#185FA5;#378ADD;#185FA5" dur="3s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="620" y="64" text-anchor="middle" font-family="monospace" font-size="18" fill="#E8F4FD">⚙️</text>
    <text x="620" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#4A7A9B">CI/CD</text>
  </g>

  <!-- 6: Deploy -->
  <g filter="url(#nodeGlow)">
    <circle cx="750" cy="60" r="26" fill="#04101E" stroke="#1D9E75" stroke-width="2.5">
      <animate attributeName="stroke" values="#1D9E75;#28D89C;#1D9E75" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="26;28;26" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="750" y="64" text-anchor="middle" font-family="monospace" font-size="18" fill="#E8F4FD">🚀</text>
    <text x="750" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#1D9E75">Deploy</text>
  </g>
</svg>
