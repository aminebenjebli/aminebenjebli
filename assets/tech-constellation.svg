<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" width="840" height="380">
  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04101E"/>
      <stop offset="100%" stop-color="#081524"/>
    </linearGradient>
    <filter id="ng">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="840" height="380" fill="url(#cBg)" rx="12"/>

  <!-- Orbit rings -->
  <ellipse cx="420" cy="190" rx="120" ry="120" fill="none" stroke="#0C447C" stroke-width="0.6" stroke-dasharray="4 6" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="0 420 190" to="360 420 190" dur="60s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="420" cy="190" rx="200" ry="140" fill="none" stroke="#0C447C" stroke-width="0.4" stroke-dasharray="3 8" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 420 190" to="-360 420 190" dur="90s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Center core -->
  <circle cx="420" cy="190" r="42" fill="#0A1929" stroke="#185FA5" stroke-width="2" filter="url(#ng)">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="190" r="52" fill="none" stroke="#185FA5" stroke-width="0.5" opacity="0.3">
    <animate attributeName="r" values="48;56;48" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="420" y="186" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="11" fill="#378ADD">FULL</text>
  <text x="420" y="201" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="11" fill="#85B7EB">STACK</text>

  <!-- Connection lines (from center to nodes) with pulse -->
  <!-- Mobile cluster -->
  <line x1="420" y1="190" x2="130" y2="80" stroke="#185FA5" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" begin="0s" repeatCount="indefinite"/>
  </line>
  <line x1="420" y1="190" x2="180" y2="155" stroke="#185FA5" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" begin="0.3s" repeatCount="indefinite"/>
  </line>
  <line x1="420" y1="190" x2="100" y2="160" stroke="#185FA5" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" begin="0.6s" repeatCount="indefinite"/>
  </line>

  <!-- Backend cluster -->
  <line x1="420" y1="190" x2="700" y2="75" stroke="#185FA5" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </line>
  <line x1="420" y1="190" x2="660" y2="150" stroke="#185FA5" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" begin="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="420" y1="190" x2="740" y2="155" stroke="#185FA5" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" begin="1.1s" repeatCount="indefinite"/>
  </line>

  <!-- DevOps cluster -->
  <line x1="420" y1="190" x2="130" y2="300" stroke="#185FA5" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" begin="1s" repeatCount="indefinite"/>
  </line>
  <line x1="420" y1="190" x2="210" y2="320" stroke="#185FA5" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" begin="1.3s" repeatCount="indefinite"/>
  </line>

  <!-- DB cluster -->
  <line x1="420" y1="190" x2="660" y2="300" stroke="#185FA5" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="420" y1="190" x2="740" y2="310" stroke="#185FA5" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" begin="1.8s" repeatCount="indefinite"/>
  </line>

  <!-- Section Labels -->
  <text x="105" y="42" font-family="monospace" font-size="12" fill="#378ADD" font-weight="bold" opacity="0.9">📱 Mobile</text>
  <text x="660" y="42" font-family="monospace" font-size="12" fill="#378ADD" font-weight="bold" opacity="0.9">🌐 Backend</text>
  <text x="90" y="268" font-family="monospace" font-size="12" fill="#378ADD" font-weight="bold" opacity="0.9">⚙️ DevOps</text>
  <text x="650" y="268" font-family="monospace" font-size="12" fill="#378ADD" font-weight="bold" opacity="0.9">🗄️ Databases</text>

  <!-- MOBILE NODES -->
  <g>
    <circle cx="130" cy="80" r="20" fill="#0A1929" stroke="#02569B" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <text x="130" y="85" text-anchor="middle" font-family="monospace" font-size="9" fill="#54C5F8" font-weight="bold">Flutter</text>
  </g>
  <g>
    <circle cx="100" cy="160" r="18" fill="#0A1929" stroke="#7F52FF" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <text x="100" y="165" text-anchor="middle" font-family="monospace" font-size="9" fill="#B89AFF" font-weight="bold">Kotlin</text>
  </g>
  <g>
    <circle cx="180" cy="145" r="18" fill="#0A1929" stroke="#F05138" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <text x="180" y="150" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF8A76" font-weight="bold">Swift</text>
  </g>
  <g>
    <circle cx="60" cy="118" r="16" fill="#0A1929" stroke="#3DDC84" stroke-width="1.2" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#7AE8A8" font-weight="bold">Android</text>
  </g>
  <g>
    <circle cx="172" cy="84" r="16" fill="#0A1929" stroke="#AAAAAA" stroke-width="1.2" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="172" y="88" text-anchor="middle" font-family="monospace" font-size="8" fill="#CCCCCC" font-weight="bold">iOS</text>
  </g>

  <!-- BACKEND NODES -->
  <g>
    <circle cx="700" cy="75" r="20" fill="#0A1929" stroke="#FFFFFF" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <text x="700" y="80" text-anchor="middle" font-family="monospace" font-size="9" fill="#EEEEEE" font-weight="bold">Next.js</text>
  </g>
  <g>
    <circle cx="660" cy="150" r="18" fill="#0A1929" stroke="#339933" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <text x="660" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#66CC66" font-weight="bold">Node</text>
  </g>
  <g>
    <circle cx="740" cy="148" r="18" fill="#0A1929" stroke="#E0234E" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <text x="740" y="153" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF6B8A" font-weight="bold">NestJS</text>
  </g>
  <g>
    <circle cx="770" cy="90" r="16" fill="#0A1929" stroke="#3178C6" stroke-width="1.2" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <text x="770" y="94" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#6BA8E0" font-weight="bold">TypeScript</text>
  </g>
  <g>
    <circle cx="700" cy="132" r="14" fill="#0A1929" stroke="#714B67" stroke-width="1.2" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="700" y="136" text-anchor="middle" font-family="monospace" font-size="8" fill="#A97D9A" font-weight="bold">Odoo</text>
  </g>

  <!-- DEVOPS NODES -->
  <g>
    <circle cx="130" cy="305" r="20" fill="#0A1929" stroke="#2496ED" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <text x="130" y="310" text-anchor="middle" font-family="monospace" font-size="9" fill="#5BB5F5" font-weight="bold">Docker</text>
  </g>
  <g>
    <circle cx="210" cy="328" r="18" fill="#0A1929" stroke="#2088FF" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <text x="210" y="326" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#60AAFF" font-weight="bold">GitHub</text>
    <text x="210" y="337" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#60AAFF" font-weight="bold">Actions</text>
  </g>
  <g>
    <circle cx="60" cy="310" r="16" fill="#0A1929" stroke="#FF9900" stroke-width="1.2" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="314" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFBB44" font-weight="bold">AWS</text>
  </g>
  <g>
    <circle cx="165" cy="345" r="15" fill="#0A1929" stroke="#FFCA28" stroke-width="1.2" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <text x="165" y="349" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#FFD960" font-weight="bold">Firebase</text>
  </g>

  <!-- DATABASE NODES -->
  <g>
    <circle cx="660" cy="300" r="20" fill="#0A1929" stroke="#4169E1" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <text x="660" y="298" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#7A9BEB" font-weight="bold">Postgre</text>
    <text x="660" y="310" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#7A9BEB" font-weight="bold">SQL</text>
  </g>
  <g>
    <circle cx="740" cy="310" r="18" fill="#0A1929" stroke="#47A248" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <text x="740" y="314" text-anchor="middle" font-family="monospace" font-size="8" fill="#7AC47B" font-weight="bold">Mongo</text>
  </g>
  <g>
    <circle cx="700" cy="348" r="15" fill="#0A1929" stroke="#4479A1" stroke-width="1.2" opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="700" y="352" text-anchor="middle" font-family="monospace" font-size="8" fill="#6FA0C5" font-weight="bold">MySQL</text>
  </g>

  <!-- Floating particles -->
  <circle cx="0" cy="0" r="1.5" fill="#378ADD" opacity="0.4">
    <animateMotion path="M300,100 C350,50 500,150 420,190 C340,230 250,180 300,100" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="0" cy="0" r="1" fill="#85B7EB" opacity="0.3">
    <animateMotion path="M550,280 C600,230 480,150 420,190 C360,230 400,310 550,280" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="15s" repeatCount="indefinite"/>
  </circle>
  <circle cx="0" cy="0" r="1.2" fill="#1D9E75" opacity="0.3">
    <animateMotion path="M200,300 C300,250 380,200 420,190 C460,180 350,280 200,300" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>
