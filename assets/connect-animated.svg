<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 120" width="840" height="120">
  <defs>
    <linearGradient id="sBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#04101E"/>
      <stop offset="50%" stop-color="#081524"/>
      <stop offset="100%" stop-color="#04101E"/>
    </linearGradient>
    <filter id="cg">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="840" height="120" fill="url(#sBg)" rx="10"/>

  <!-- Radar pulse from center -->
  <circle cx="420" cy="60" r="10" fill="none" stroke="#185FA5" stroke-width="0.5" opacity="0">
    <animate attributeName="r" from="10" to="200" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.5" to="0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="60" r="10" fill="none" stroke="#185FA5" stroke-width="0.5" opacity="0">
    <animate attributeName="r" from="10" to="200" dur="4s" begin="1.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.4" to="0" dur="4s" begin="1.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="60" r="10" fill="none" stroke="#185FA5" stroke-width="0.5" opacity="0">
    <animate attributeName="r" from="10" to="200" dur="4s" begin="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3" to="0" dur="4s" begin="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Signal icon center -->
  <circle cx="420" cy="60" r="6" fill="#378ADD" filter="url(#cg)">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Connection labels -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <!-- LinkedIn -->
    <rect x="140" y="32" width="110" height="56" rx="8" fill="#0A1929" stroke="#0A66C2" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="195" y="56" text-anchor="middle" font-family="monospace" font-size="10" fill="#4A9FE5">💼</text>
    <text x="195" y="74" text-anchor="middle" font-family="monospace" font-size="10" fill="#4A9FE5" font-weight="bold">LinkedIn</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.8s" fill="freeze"/>
    <!-- Gmail -->
    <rect x="365" y="32" width="110" height="56" rx="8" fill="#0A1929" stroke="#EA4335" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <text x="420" y="56" text-anchor="middle" font-family="monospace" font-size="10" fill="#F07066">✉️</text>
    <text x="420" y="74" text-anchor="middle" font-family="monospace" font-size="10" fill="#F07066" font-weight="bold">Email</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.1s" fill="freeze"/>
    <!-- Portfolio -->
    <rect x="590" y="32" width="110" height="56" rx="8" fill="#0A1929" stroke="#1D9E75" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <text x="645" y="56" text-anchor="middle" font-family="monospace" font-size="10" fill="#3DC49A">🌐</text>
    <text x="645" y="74" text-anchor="middle" font-family="monospace" font-size="10" fill="#3DC49A" font-weight="bold">Portfolio</text>
  </g>
</svg>
