<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 40" width="840" height="40">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#04101E" stop-opacity="0"/>
      <stop offset="20%" stop-color="#185FA5" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#378ADD" stop-opacity="1"/>
      <stop offset="80%" stop-color="#185FA5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#04101E" stop-opacity="0"/>
    </linearGradient>
    <filter id="dg">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Main line -->
  <line x1="80" y1="20" x2="760" y2="20" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Center diamond -->
  <rect x="413" y="13" width="14" height="14" rx="2" fill="none" stroke="#378ADD" stroke-width="1.2" transform="rotate(45,420,20)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Pulsing dots -->
  <circle cx="300" cy="20" r="2.5" fill="#185FA5">
    <animate attributeName="r" values="1.5;3;1.5" dur="2s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="20" r="2.5" fill="#185FA5">
    <animate attributeName="r" values="1.5;3;1.5" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="20" r="1.5" fill="#0C447C">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="20" r="1.5" fill="#0C447C">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Traveling light -->
  <circle r="4" fill="#378ADD" filter="url(#dg)" opacity="0.6">
    <animateMotion path="M80,20 L760,20" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
